short_bio: >-
  <p>
    I am a Ph.D. student in the <a href="https://www.au.tsinghua.edu.cn/" target="_blank">Department of Automation</a>
    at <a href="https://www.tsinghua.edu.cn/en/" target="_blank">Tsinghua University</a>, advised by Prof. Jiwen Lu.
    My research centers on <strong>visual generation and multimodal world models</strong> &mdash; image, video, 4D
    generation &mdash; with a parallel interest in AI-generated content (AIGC) detection and forensics.
  </p>
  <p>
    On the methodological side, I work on diffusion, autoregressive generation, 3D/4D reconstruction, and pretraining large image generation models</p>

